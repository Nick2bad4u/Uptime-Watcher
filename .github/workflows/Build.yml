# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
# yamllint disable rule:line-length
name: "Build and Release Electron App"

run-name: "Build and Release Electron App"

concurrency:
    group: "build-${{ github.ref }}"
    cancel-in-progress: "${{ false }}"

on:
    workflow_dispatch:
        inputs:
            release_version:
                description: "Exact SemVer already present in package.json, README, SECURITY, and CHANGELOG.md"
                required: true
                type: "string"

permissions:
    contents: "read"
jobs:
    bump-version:
        name: "Validate release version and signing credentials"
        runs-on: "ubuntu-latest"
        timeout-minutes: 15
        defaults:
            run:
                shell: "bash"
                working-directory: "."
        outputs:
            new_version: "${{ steps.validate_release.outputs.new_version }}"
            bump_sha: "${{ steps.validate_release.outputs.bump_sha }}"
        steps:
            - name: "Harden the runner (Audit all outbound calls)"
              id: "harden_runner"
              uses: "step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411" # v2.19.4
              with:
                  egress-policy: "audit"

            - name: "Checkout Repo code"
              id: "checkout_code"
              uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10" # v6.0.3
              with:
                  ref: "${{ github.ref }}"
                  fetch-depth: 0
                  fetch-tags: true

            - name: "Setup Node.js environment (v25)"
              uses: "actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e" # v6.4.0
              with:
                  node-version-file: ".node-version"
                  cache: "npm"
                  cache-dependency-path: "package-lock.json"

            - name: "Show git diff for Uptime-Watcher (debug)"
              id: "git_diff"
              run: |
                  echo "--- GIT DIFF OUTPUT (since last tag) ---"
                  git fetch --tags --force
                  LAST_REF=$(git describe --tags --match "v*" --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)
                  git diff --name-status "$LAST_REF" -- .
                  echo "--- END GIT DIFF OUTPUT ---"
              continue-on-error: true

            - name: "Check release metadata"
              run: "npm run release:check"

            - name: "Validate requested release version"
              id: "validate_release"
              run: |
                  set -euo pipefail

                  if [ ! -f package.json ]; then
                    echo "Error: package.json not found" >&2
                    exit 1
                  fi
                  if ! jq empty package.json >/dev/null 2>&1; then
                    echo "Error: package.json is not valid JSON" >&2
                    exit 1
                  fi

                  requested_version="${{ inputs.release_version }}"
                  package_version=$(jq -r .version package.json)

                  if [[ ! "$requested_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
                    echo "Error: release_version must be a SemVer value, received '$requested_version'" >&2
                    exit 1
                  fi

                  if [ "$requested_version" != "$package_version" ]; then
                    echo "Error: release_version ($requested_version) must match package.json version ($package_version)." >&2
                    echo "Update package metadata in a reviewed commit before dispatching this workflow." >&2
                    exit 1
                  fi

                  if git rev-parse "v$requested_version" >/dev/null 2>&1; then
                    echo "Error: tag v$requested_version already exists." >&2
                    exit 1
                  fi

                  {
                    echo "new_version=$requested_version"
                    echo "bump_sha=$(git rev-parse HEAD)"
                  } >> "$GITHUB_OUTPUT"

            - name: "Verify release signing credentials"
              shell: "bash"
              env:
                  WINDOWS_CSC_LINK: "${{ secrets.WINDOWS_CSC_LINK }}"
                  WINDOWS_CSC_KEY_PASSWORD: "${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}"
                  WINDOWS_PUBLISHER_NAME: "${{ secrets.WINDOWS_PUBLISHER_NAME }}"
                  MACOS_CSC_LINK: "${{ secrets.MACOS_CSC_LINK }}"
                  MACOS_CSC_KEY_PASSWORD: "${{ secrets.MACOS_CSC_KEY_PASSWORD }}"
                  APPLE_API_KEY: "${{ secrets.APPLE_API_KEY }}"
                  APPLE_API_KEY_ID: "${{ secrets.APPLE_API_KEY_ID }}"
                  APPLE_API_ISSUER: "${{ secrets.APPLE_API_ISSUER }}"
              run: |
                  set -euo pipefail

                  required_secrets=(
                    WINDOWS_CSC_LINK
                    WINDOWS_CSC_KEY_PASSWORD
                    WINDOWS_PUBLISHER_NAME
                    MACOS_CSC_LINK
                    MACOS_CSC_KEY_PASSWORD
                    APPLE_API_KEY
                    APPLE_API_KEY_ID
                    APPLE_API_ISSUER
                  )
                  missing_secrets=()

                  for secret_name in "${required_secrets[@]}"; do
                    if [ -z "${!secret_name:-}" ]; then
                      missing_secrets+=("$secret_name")
                    fi
                  done

                  if [ "${#missing_secrets[@]}" -gt 0 ]; then
                    printf '::error::Official releases require configured signing secrets: %s\n' "${missing_secrets[*]}"
                    exit 1
                  fi

    build:
        name: "Build release artifacts"
        needs: "bump-version"
        runs-on: "${{ matrix.os }}"
        timeout-minutes: 60
        env:
            # Vite (and vite-plugin-electron) can run multiple builds in the same
            # Node process (renderer + main + preload). With sourcemaps and build
            # plugins, the default ~2GB heap on GitHub runners (notably macOS
            # arm64) is easy to exceed.
            NODE_OPTIONS: "--max_old_space_size=8192"
        strategy:
            matrix:
                os:
                    - "ubuntu-latest"
                    - "ubuntu-24.04-arm"
                    - "windows-latest"
                    - "macos-15"
                    - "macos-latest"

                arch: ["x64", "ia32", "arm64"]
                exclude:
                    # Exclude macOS with ia32 architecture as it is not supported by Electron
                    - os: "macos-latest"
                      arch: "ia32"
                    - os: "macos-latest"
                      arch: "arm64"
                    - os: "macos-15"
                      arch: "ia32"
                    - os: "macos-15"
                      arch: "x64"
                    # Exclude Ubuntu with ia32 and arm64 architectures as they are not commonly used and not officially supported except for ubuntu-24.04-arm/arm64
                    - os: "ubuntu-latest"
                      arch: "ia32"
                    - os: "ubuntu-latest"
                      arch: "arm64"
                    # Exclude ubuntu-24.04-arm with x64 and ia32
                    - os: "ubuntu-24.04-arm"
                      arch: "x64"
                    - os: "ubuntu-24.04-arm"
                      arch: "ia32"
                    - os: "ubuntu-24.04-arm"
                      arch: "arm64"
                    # Exclude Windows with arm64 (not supported)
                    - os: "windows-latest"
                      arch: "arm64"
                    # Exclude Windows with ia32 (if not supported, uncomment)
                    # - os: windows-latest
                    #   arch: ia32
        steps:
            - name: "Harden the runner (Audit all outbound calls)"
              uses: "step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411" # v2.19.4
              with:
                  egress-policy: "audit"

            - name: "Checkout Repo code"
              uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10" # v6.0.3
              with:
                  ref: "${{ needs.bump-version.outputs.bump_sha }}"
                  fetch-depth: 0
                  fetch-tags: true

            - name: "Setup Node.js environment (v25)"
              uses: "actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e" # v6.4.0
              with:
                  node-version-file: ".node-version"
                  cache: "npm"
                  cache-dependency-path: "package-lock.json"

            - name: "Install Linux build dependencies"
              id: "install_linux_deps"
              if: "runner.os == 'Linux'"
              shell: "bash"
              run: |
                  sudo apt-get update
                  sudo apt-get install -y rpm dpkg fakeroot xz-utils flatpak flatpak-builder ruby ruby-dev build-essential zlib1g-dev
                  sudo gem install --no-document fpm
                  sudo apt-get install -y libarchive-tools
                  sudo apt-get install -y pkg-config pkgconf pkg-haskell-tools pkg-js-tools pkg-kde-tools pkg-perl-tools pkg-php-tools
                  which bsdtar
                  sudo apt-get install -y pacman

            - name: "Install macOS build dependencies"
              id: "install_macos_deps"
              if: "runner.os == 'macOS'"
              shell: "bash"
              run: |
                  brew install rpm dpkg xz gnu-tar

            - name: "Install dmg-license workaround for Mac Builder"
              id: "install_dmg_license"
              if: "runner.os == 'macOS'"
              shell: "bash"
              run: "npm install --force --no-save --no-audit --no-fund dmg-license"
              working-directory: "."

            - name: "Install Windows build dependencies (Chocolatey)"
              id: "install_windows_deps"
              if: "runner.os == 'Windows'"
              shell: "pwsh"
              run: |
                  choco install -y 7zip.install

            - name: "Cache node modules (Windows)"
              id: "cache_node_modules_windows"
              if: "runner.os == 'Windows'"
              uses: "actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae" # v5.0.5
              with:
                  path: |
                      ~\.npm
                      .\node_modules
                      ~\node_modules
                      ~\.cache
                      ~\icons
                      ~\libs
                  key: "${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}"
                  restore-keys: |
                      ${{ runner.os }}-node-
                  enableCrossOsArchive: true
              continue-on-error: true

            - name: "Cache node modules (non-Windows)"
              id: "cache_node_modules_non_windows"
              if: "runner.os != 'Windows'"
              uses: "actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae" # v5.0.5
              with:
                  path: "~/.npm"
                  key: "${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}"
                  restore-keys: |
                      ${{ runner.os }}-node-
                  enableCrossOsArchive: true
              continue-on-error: true

            - name: "Install NPM dependencies (.package.json)"
              id: "install_dependencies"
              shell: "bash"
              run: |
                  # NOTE: This repo requires --force due to known peer-dependency conflicts.
                  # Do NOT use --omit=optional: Rollup/Vite depends on optional native packages
                  # (e.g. @rollup/rollup-darwin-*) on macOS.
                  npm install --force --no-audit --no-fund

            - name: "Build Vite Frontend and Electron Backend"
              id: "build_vite_electron"
              shell: "bash"
              run: "npm run build"

            - name: "Build Electron app (debug)"
              id: "build_app"
              shell: "bash"
              run: |
                  # For macOS universal builds, remove optional native ws accelerators
                  # (bufferutil, utf-8-validate) so @electron/universal does not attempt
                  # to merge their non-Mach-O .node binaries. ws will transparently
                  # fall back to its pure JS implementation when these modules are
                  # missing, which is acceptable for the macOS universal target.
                  if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
                    echo "Removing optional ws native deps (bufferutil, utf-8-validate) for macOS universal build"
                    rm -rf node_modules/bufferutil node_modules/utf-8-validate || true
                  fi

                  if [[ "${{ runner.os }}" == "Windows" ]]; then
                    if [[ "${{ matrix.arch }}" == "x64" ]]; then
                      npx electron-builder --config electron-builder.config.ts --publish never --win
                    else
                      npx electron-builder --config electron-builder.config.ts --publish never --win --ia32
                    fi
                  elif [[ "${{ matrix.os }}" == "macos-15" ]]; then
                    npx electron-builder --config electron-builder.config.ts --publish never --mac --arm64
                  elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
                    npx electron-builder --config electron-builder.config.ts --publish never --mac --universal
                  elif [[ "${{ matrix.os }}" == "windows-latest" ]]; then
                    if [[ "${{ matrix.arch }}" == "x64" ]]; then
                      npx electron-builder --config electron-builder.config.ts --publish never --win
                    else
                      npx electron-builder --config electron-builder.config.ts --publish never --win --ia32
                    fi
                  elif [[ "${{ matrix.os }}" == "ubuntu-24.04-arm" ]]; then
                    npx electron-builder --config electron-builder.config.ts --publish never --linux --arm64
                  elif [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
                    npx electron-builder --config electron-builder.config.ts --publish never --linux --${{ matrix.arch }}
                  else
                    npx electron-builder --config electron-builder.config.ts --publish never --${{ matrix.arch }}
                  fi
              env:
                  GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
                  DEBUG_DEMB: true
                  CI: true
                  DEBUG: "@malept/flatpak-bundler"
                  UPTIME_WATCHER_OFFICIAL_RELEASE: "true"
                  WINDOWS_PUBLISHER_NAME: "${{ runner.os == 'Windows' && secrets.WINDOWS_PUBLISHER_NAME || '' }}"
                  CSC_LINK: "${{ runner.os == 'Windows' && secrets.WINDOWS_CSC_LINK || runner.os == 'macOS' && secrets.MACOS_CSC_LINK || '' }}"
                  CSC_KEY_PASSWORD: "${{ runner.os == 'Windows' && secrets.WINDOWS_CSC_KEY_PASSWORD || runner.os == 'macOS' && secrets.MACOS_CSC_KEY_PASSWORD || '' }}"
                  APPLE_API_KEY: "${{ runner.os == 'macOS' && secrets.APPLE_API_KEY || '' }}"
                  APPLE_API_KEY_ID: "${{ runner.os == 'macOS' && secrets.APPLE_API_KEY_ID || '' }}"
                  APPLE_API_ISSUER: "${{ runner.os == 'macOS' && secrets.APPLE_API_ISSUER || '' }}"

            - name: "Generate CycloneDX production SBOM"
              if: "matrix.os == 'ubuntu-latest' && matrix.arch == 'x64'"
              shell: "bash"
              run: |
                  set -euo pipefail
                  npm sbom \
                    --package-lock-only \
                    --omit dev \
                    --sbom-format cyclonedx \
                    --sbom-type application \
                    > "release/Uptime-Watcher-sbom-${{ needs.bump-version.outputs.new_version }}.cdx.json"

                  node -e '
                    const fs = require("node:fs");
                    const path = process.argv[1];
                    const expectedVersion = process.argv[2];
                    const sbom = JSON.parse(fs.readFileSync(path, "utf8"));
                    if (sbom.bomFormat !== "CycloneDX") throw new Error("Unexpected SBOM format");
                    if (sbom.metadata?.component?.version !== expectedVersion) {
                      throw new Error(`SBOM version ${sbom.metadata?.component?.version} does not match ${expectedVersion}`);
                    }
                  ' \
                    "release/Uptime-Watcher-sbom-${{ needs.bump-version.outputs.new_version }}.cdx.json" \
                    "${{ needs.bump-version.outputs.new_version }}"

            - name: "Verify Windows release signatures"
              if: "runner.os == 'Windows'"
              shell: "pwsh"
              env:
                  WINDOWS_PUBLISHER_NAME: "${{ secrets.WINDOWS_PUBLISHER_NAME }}"
              run: |
                  $ErrorActionPreference = 'Stop'
                  $signedFiles = @(
                    Get-ChildItem -LiteralPath 'release' -Recurse -File |
                      Where-Object { $_.Extension -in @('.exe', '.msi') }
                  )

                  if ($signedFiles.Count -eq 0) {
                    throw 'No Windows executables or installers were produced for signature verification.'
                  }

                  foreach ($file in $signedFiles) {
                    $signature = Get-AuthenticodeSignature -LiteralPath $file.FullName
                    if ($signature.Status -ne [System.Management.Automation.SignatureStatus]::Valid) {
                      throw "Invalid Authenticode signature for $($file.Name): $($signature.Status)"
                    }

                    if (-not $signature.SignerCertificate.Subject.Contains($env:WINDOWS_PUBLISHER_NAME, [System.StringComparison]::OrdinalIgnoreCase)) {
                      throw "Unexpected Authenticode publisher for $($file.Name)."
                    }
                  }

            - name: "Verify macOS signatures and notarization"
              if: "runner.os == 'macOS'"
              shell: "bash"
              run: |
                  set -euo pipefail

                  apps=()
                  while IFS= read -r -d '' app_bundle; do
                    apps+=("$app_bundle")
                  done < <(find release -type d -name '*.app' -print0)

                  distributables=()
                  while IFS= read -r -d '' distributable; do
                    distributables+=("$distributable")
                  done < <(find release -type f \( -name '*.dmg' -o -name '*.pkg' \) -print0)

                  if [ "${#apps[@]}" -eq 0 ] || [ "${#distributables[@]}" -eq 0 ]; then
                    echo "::error::Expected signed app bundles and notarized macOS distributables were not produced."
                    exit 1
                  fi

                  for app_bundle in "${apps[@]}"; do
                    codesign --verify --deep --strict --verbose=2 "$app_bundle"
                    spctl --assess --verbose --type exec "$app_bundle"
                  done

                  for distributable in "${distributables[@]}"; do
                    xcrun stapler validate "$distributable"
                  done

            - name: "Print Windows distributable hash (debug, Windows)"
              id: "print_hash_windows"
              if: "runner.os == 'Windows'"
              shell: "pwsh"
              run: |
                  $patterns = @('*.exe','*.nupkg','*.dmg','*.AppImage','*.snap','*.zip','*.yml','*.blockmap','*.msi','*.deb','*.rpm','*.pkg','*.mas','*.apk','*.p5p','*.pacman','*.freebsd','*.flatpak')
                  $files = @()
                  foreach ($pattern in $patterns) {
                    $files += Get-ChildItem -Path release -Recurse -Include $pattern -ErrorAction SilentlyContinue
                  }
                  foreach ($file in $files | Sort-Object FullName -Unique) {
                    $hash = Get-FileHash $file.FullName -Algorithm SHA512
                    $bytes = for ($i = 0; $i -lt $hash.Hash.Length; $i += 2) { [Convert]::ToByte($hash.Hash.Substring($i, 2), 16) }
                    $b64 = [Convert]::ToBase64String($bytes)
                    Write-Host "$($file.FullName): $b64"
                  }
              continue-on-error: true
            - name: "Print Linux distributable hash (debug, Linux)"
              id: "print_hash_linux"
              if: "runner.os == 'Linux'"
              shell: "bash"
              run: |
                  find release -type f \( -name '*.exe' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.snap' -o -name '*.zip' -o -name '*.yml' -o -name '*.blockmap' -o -name '*.msi' -o -name '*.deb' -o -name '*.rpm' -o -name '*.pkg' -o -name '*.mas' -o -name '*.apk' -o -name '*.p5p' -o -name '*.pacman' -o -name '*.freebsd' -o -name '*.flatpak' \) | sort | while read -r file; do
                    hash=$(sha512sum "$file" | awk '{print $1}')
                    b64=$(echo "$hash" | xxd -r -p | base64)
                    echo "$file: $b64"
                  done
              continue-on-error: true
            - name: "Print Mac distributable hash (debug, macOS)"
              id: "print_hash_macos"
              if: "runner.os == 'macOS'"
              shell: "bash"
              run: |
                  find release -type f \( -name '*.exe' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.snap' -o -name '*.zip' -o -name '*.yml' -o -name '*.blockmap' -o -name '*.msi' -o -name '*.deb' -o -name '*.rpm' -o -name '*.pkg' -o -name '*.mas' -o -name '*.apk' -o -name '*.p5p' -o -name '*.pacman' -o -name '*.freebsd' -o -name '*.flatpak' \) | sort | while read -r file; do
                    hash=$(shasum -a 512 "$file" | awk '{print $1}')
                    b64=$(echo "$hash" | xxd -r -p | base64)
                    echo "$file: $b64"
                  done
              continue-on-error: true

            - name: "Upload packaged distributables as artifact"
              id: "upload_artifact"
              uses: "actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a" # v7.0.1
              with:
                  name: "dist-${{ matrix.os }}-${{ matrix.arch }}"
                  path: |
                      release/Uptime-Watcher-*
                      release/*.yml
                      release/*.blockmap
                      release/squirrel*/**/*
                      release/nsis-web/**/*
                  include-hidden-files: true
                  if-no-files-found: "error"

            - name: "Update Build Matrix Summary (per platform/arch)"
              if: "always()"
              shell: "bash"
              run: |
                  STATUS="${{ job.status }}"
                  # If build_app step failed, mark as failure
                  if [ "${{ steps.build_app.outcome }}" = "failure" ]; then
                    STATUS="failure"
                  elif [ "${{ steps.build_app.outcome }}" = "success" ]; then
                    STATUS="success"
                  fi
                  echo "| ${{ needs.bump-version.outputs.new_version }} | ${{ matrix.os }} | ${{ matrix.arch }} | Build Status: $STATUS |" >> "$GITHUB_STEP_SUMMARY"

    release:
        name: "Publish release and update changelogs"
        needs: ["build", "bump-version"]
        if: "${{ needs.build.result == 'success' && needs.bump-version.result == 'success' }}"
        runs-on: "ubuntu-latest"
        timeout-minutes: 45
        permissions:
            checks: "write"
            contents: "write"
        defaults:
            run:
                shell: "bash"
                working-directory: "."
        steps:
            - name: "Harden the runner (Audit all outbound calls)"
              uses: "step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411" # v2.19.4
              with:
                  egress-policy: "audit"

            - name: "Checkout Repo code"
              uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10" # v6.0.3
              with:
                  ref: "${{ needs.bump-version.outputs.bump_sha }}"
                  fetch-depth: 0
                  fetch-tags: true

            - name: "Download all build artifacts from build job"
              uses: "actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c" # v8.0.1
              with:
                  path: "./artifacts"

            - name: "Verify build artifacts were downloaded"
              id: "verify_artifacts"
              shell: "bash"
              run: |
                  set -euo pipefail

                  if [ ! -d "./artifacts" ]; then
                    echo "::error::./artifacts directory was not created. The build job likely did not upload any artifacts."
                    exit 1
                  fi

                  shopt -s nullglob
                  artifact_dirs=(./artifacts/dist-*)
                  shopt -u nullglob

                  if [ "${#artifact_dirs[@]}" -eq 0 ]; then
                    echo "::error::No ./artifacts/dist-* directories found. The build job likely uploaded nothing (or the artifact name changed)."
                    echo "Contents of ./artifacts:";
                    ls -la ./artifacts || true
                    exit 1
                  fi

            - name: "Determine previous release tag"
              id: "previous_tag"
              shell: "bash"
              run: |
                  set -euo pipefail
                  git fetch --tags --force
                  release_sha="${{ needs.bump-version.outputs.bump_sha }}"
                  prev_tag=$(git describe --tags --match "v*" --abbrev=0 "${release_sha}^" 2>/dev/null || true)
                  echo "previous_tag=${prev_tag}" >> "$GITHUB_OUTPUT"

            - name: "Generate release notes since previous tag"
              id: "release_notes_full"
              shell: "bash"
              run: |
                  set -euo pipefail
                  git fetch --tags --force
                  release_sha="${{ needs.bump-version.outputs.bump_sha }}"
                  prev_tag="${{ steps.previous_tag.outputs.previous_tag }}"

                  if [ -n "$prev_tag" ]; then
                    range_spec="${prev_tag}..${release_sha}"
                  else
                    range_spec="${release_sha}"
                  fi

                  notes=$(git log "$range_spec" --pretty=format:"- %s%n  - Author: %an <%ae>%n  - Commit: [%h](https://github.com/${{ github.repository }}/commit/%H)%n  - Date: %ad%n" --date=short)
                  if [ -z "$notes" ]; then
                    notes="No commits found for range ${range_spec}"
                  fi

                  {
                    echo "notes<<EOF"
                    echo "$notes"
                    echo "EOF"
                  } >> "$GITHUB_OUTPUT"

            - name: "Print Windows artifact hash (debug, Windows)"
              id: "print_artifact_hash_windows"
              if: "runner.os == 'Windows'"
              shell: "pwsh"
              run: |
                  $patterns = @('*.exe','*.nupkg','*.dmg','*.AppImage','*.snap','*.zip','*.yml','*.blockmap','*.msi','*.deb','*.rpm','*.pkg','*.mas','*.apk','*.p5p','*.pacman','*.freebsd','*.flatpak')
                  $files = @()
                  foreach ($pattern in $patterns) {
                    $files += Get-ChildItem -Path artifacts -Recurse -Include $pattern -ErrorAction SilentlyContinue
                  }
                  foreach ($file in $files | Sort-Object FullName -Unique) {
                    $hash = Get-FileHash $file.FullName -Algorithm SHA512
                    $bytes = for ($i = 0; $i -lt $hash.Hash.Length; $i += 2) { [Convert]::ToByte($hash.Hash.Substring($i, 2), 16) }
                    $b64 = [Convert]::ToBase64String($bytes)
                    Write-Host "$($file.FullName): $b64"
                  }
            - name: "Print Linux artifact hash (debug, Linux)"
              id: "print_artifact_hash_linux"
              if: "runner.os == 'Linux'"
              shell: "bash"
              run: |
                  if [ ! -d "./artifacts" ]; then
                    echo "ERROR: ./artifacts directory does not exist."
                    exit 1
                  fi
                  find artifacts -type f \( -name '*.exe' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.snap' -o -name '*.zip' -o -name '*.yml' -o -name '*.blockmap' -o -name '*.msi' -o -name '*.deb' -o -name '*.rpm' -o -name '*.pkg' -o -name '*.mas' -o -name '*.apk' -o -name '*.p5p' -o -name '*.pacman' -o -name '*.freebsd' -o -name '*.flatpak' \) | sort | while read -r file; do
                    hash=$(sha512sum "$file" | awk '{print $1}')
                    b64=$(echo "$hash" | xxd -r -p | base64)
                    echo "$file: $b64"
                  done
            - name: "Print MacOS artifact hash (debug, macOS)"
              id: "print_artifact_hash_macos"
              if: "runner.os == 'macOS'"
              shell: "bash"
              run: |
                  find artifacts -type f \( -name '*.exe' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.snap' -o -name '*.zip' -o -name '*.yml' -o -name '*.blockmap' -o -name '*.msi' -o -name '*.deb' -o -name '*.rpm' -o -name '*.pkg' -o -name '*.mas' -o -name '*.apk' -o -name '*.p5p' -o -name '*.pacman' -o -name '*.freebsd' -o -name '*.flatpak' \) | sort | while read -r file; do
                    hash=$(shasum -a 512 "$file" | awk '{print $1}')
                    b64=$(echo "$hash" | xxd -r -p | base64)
                    echo "$file: $b64"
                  done

            - name: "List artifacts (debug)"
              id: "list_artifacts"
              run: "ls -R ./artifacts"

            - name: "Rename Windows latest.yml files for unique arch/platform"
              id: "rename_windows_latest_yml"
              shell: "bash"
              run: |
                  echo "Renaming nsis-web and root latest.yml files for Windows builds in ./artifacts..."
                  # 32-bit (ia32)
                  for ia32_root in \
                    "./artifacts/dist-windows-latest-ia32/latest.yml" \
                    "./artifacts/dist-windows-latest-ia32/release/latest.yml"; do
                    if [ -f "$ia32_root" ]; then
                      ia32_root_dir=$(dirname "$ia32_root")
                      mv "$ia32_root" "$ia32_root_dir/latest-win32.yml"
                      echo "Renamed $ia32_root -> $ia32_root_dir/latest-win32.yml"
                      break
                    fi
                  done

                  for ia32_nsis in \
                    "./artifacts/dist-windows-latest-ia32/nsis-web/latest.yml" \
                    "./artifacts/dist-windows-latest-ia32/release/nsis-web/latest.yml"; do
                    if [ -f "$ia32_nsis" ]; then
                      ia32_nsis_dir=$(dirname "$ia32_nsis")
                      mv "$ia32_nsis" "$ia32_nsis_dir/latest-nsis-web-win32.yml"
                      echo "Renamed $ia32_nsis -> $ia32_nsis_dir/latest-nsis-web-win32.yml"
                      break
                    fi
                  done
                  # 64-bit (x64)
                  for x64_nsis in \
                    "./artifacts/dist-windows-latest-x64/nsis-web/latest.yml" \
                    "./artifacts/dist-windows-latest-x64/release/nsis-web/latest.yml"; do
                    if [ -f "$x64_nsis" ]; then
                      x64_nsis_dir=$(dirname "$x64_nsis")
                      mv "$x64_nsis" "$x64_nsis_dir/latest-nsis-web.yml"
                      echo "Renamed $x64_nsis -> $x64_nsis_dir/latest-nsis-web.yml"
                      break
                    fi
                  done

            - name: "Organize distributables by platform and arch"
              id: "organize_distributables"
              shell: "bash"
              run: |
                  set -uo pipefail
                  # NOTE: not using `set -e` so we can log and continue on some failures

                  echo "=== Step: Organize distributables by platform and arch ==="
                  echo "Working directory: $(pwd)"
                  echo "Directory listing (.)"
                  ls -la

                  echo
                  echo "=== Check ./artifacts exists and contents ==="
                  if [ ! -d "./artifacts" ]; then
                    echo "ERROR: ./artifacts directory does not exist."
                    exit 1
                  fi

                  echo "Before copy, contents of ./artifacts:"
                  ls -R ./artifacts || { echo "ERROR: ls -R ./artifacts failed"; exit 1; }

                  echo
                  echo "=== Creating release-dist directory ==="
                  mkdir -p release-dist
                  echo "Created release-dist. Current contents:"
                  ls -la release-dist || echo "WARNING: ls release-dist failed (non-fatal)."

                  echo
                  echo "=== Finding dist-* artifact directories ==="
                  shopt -s nullglob
                  artifact_dirs=(./artifacts/dist-*)
                  shopt -u nullglob

                  echo "Number of matching artifact dirs: ${#artifact_dirs[@]}"
                  if [ "${#artifact_dirs[@]}" -eq 0 ]; then
                    echo "WARNING: No ./artifacts/dist-* directories found."
                  else
                    printf 'Found artifact dirs:\n'
                    for d in "${artifact_dirs[@]}"; do
                      echo "  - $d"
                    done
                  fi

                  echo
                  echo "=== Begin processing artifacts ==="
                  for artifact_dir in "${artifact_dirs[@]}"; do
                    echo
                    echo "----- Processing artifact_dir: $artifact_dir -----"

                    if [ ! -d "$artifact_dir" ]; then
                      echo "SKIP: $artifact_dir is not a directory."
                      continue
                    fi

                    artifact_name=$(basename "$artifact_dir")
                    platform_arch=${artifact_name#dist-}

                    echo "artifact_name: $artifact_name"
                    echo "platform_arch: $platform_arch"

                    target_dir="release-dist/$platform_arch"
                    echo "Target directory: $target_dir"

                    mkdir -p "$target_dir" || { echo "ERROR: Failed to create $target_dir"; exit 1; }

                    echo
                    echo "Listing artifact_dir contents for debugging:"
                    ls -la "$artifact_dir" || { echo "ERROR: Failed to list $artifact_dir"; exit 1; }

                    echo
                    echo "Resolving artifact source root (supports nested release/ or dist/ directories)"
                    source_root="$artifact_dir"
                    if [ -d "$artifact_dir/release" ]; then
                      source_root="$artifact_dir/release"
                    elif [ -d "$artifact_dir/dist" ]; then
                      source_root="$artifact_dir/dist"
                    fi

                    echo "Source root resolved to: $source_root"
                    echo "Listing source_root contents for debugging:"
                    ls -la "$source_root" || { echo "ERROR: Failed to list $source_root"; exit 1; }

                    echo
                    echo "Moving main files from $source_root to $target_dir"
                    echo "Glob patterns:"
                    echo "  - $source_root/Uptime-Watcher-*"
                    echo "  - $source_root/*.yml"

                    # Expand globs explicitly so we can see what exists
                    main_files=()
                    for f in "$source_root"/Uptime-Watcher-* "$source_root"/*.yml; do
                      if [ -e "$f" ]; then
                        main_files+=("$f")
                      fi
                    done

                    echo "Resolved main_files (${#main_files[@]}):"
                    if [ "${#main_files[@]}" -eq 0 ]; then
                      echo "  (none found)"
                    else
                      for f in "${main_files[@]}"; do
                        echo "  - $f"
                      done
                    fi

                    if [ "${#main_files[@]}" -gt 0 ]; then
                      echo "Moving main files into $target_dir to avoid duplicating large artifacts..."
                      # Use mv instead of cp to avoid quickly exhausting the ephemeral runner disk
                      if ! mv -v "${main_files[@]}" "$target_dir/"; then
                        echo "ERROR: Failed to move main files for $artifact_dir"
                        # Do not exit so we can continue and see other artifacts
                      fi
                    fi

                    echo
                    echo "Handling latest-mac.yml rename, if present"
                    # At this point main files (including latest-mac.yml) have been moved into $target_dir
                    if [ -f "$target_dir/latest-mac.yml" ]; then
                      new_latest="$target_dir/latest-$platform_arch.yml"
                      echo "Found $target_dir/latest-mac.yml, renaming to $new_latest"
                      if mv -v "$target_dir/latest-mac.yml" "$new_latest"; then
                        echo "Renamed latest-mac.yml to architecture-specific name for $platform_arch"
                      else
                        echo "ERROR: Failed to rename latest-mac.yml for $artifact_dir"
                      fi
                    else
                      echo "No latest-mac.yml found in $target_dir"
                    fi

                    echo
                    echo "Copying subdirectories (nsis-web, squirrel-windows, squirrel-windows-ia32)"
                    for subdir in nsis-web squirrel-windows squirrel-windows-ia32; do
                      src_subdir="$source_root/$subdir"
                      if [ -d "$src_subdir" ]; then
                        echo "Moving directory: $src_subdir -> $target_dir/"
                        # Move the directory rather than copying to avoid doubling disk usage
                        if ! mv -v "$src_subdir" "$target_dir/"; then
                          echo "ERROR: Failed to move $src_subdir"
                        fi
                      else
                        echo "Subdir not found (skipping): $src_subdir"
                      fi
                    done

                    echo
                    echo "Checking for stray latest-mac.yml in $target_dir"
                    if [ -f "$target_dir/latest-mac.yml" ]; then
                      echo "Removing stray $target_dir/latest-mac.yml"
                      rm -v "$target_dir/latest-mac.yml" || echo "WARNING: Failed to remove $target_dir/latest-mac.yml"
                    else
                      echo "No stray latest-mac.yml found in $target_dir"
                    fi

                    echo "----- Finished artifact_dir: $artifact_dir -----"
                  done

                  echo
                  echo "=== Final contents of release-dist ==="
                  if [ -d "release-dist" ]; then
                    ls -R release-dist || echo "WARNING: ls -R release-dist failed."
                  else
                    echo "WARNING: release-dist directory was not created."
                  fi

                  echo "=== Organize step complete ==="

            - name: "Fix all sha512 in latest*.yml files"
              id: "fix_sha512"
              shell: "bash"
              run: |
                  set -e
                  find release-dist -type f -name 'latest*.yml' | while IFS= read -r yml; do
                    echo "Processing $yml"
                    dir=$(dirname "$yml")
                    tmp_file="${yml}.tmp"
                    first_file_sha512=""
                    first_file_path=""
                    in_files_section=0
                    current_url=""
                    file_count=0
                    updated_count=0
                    missing_count=0
                    while IFS= read -r line; do
                      if [[ $line =~ ^[[:space:]]*files: ]]; then
                        in_files_section=1
                        echo "$line" >> "$tmp_file"
                        continue
                      fi
                      if [[ $in_files_section -eq 1 ]]; then
                        if [[ $line =~ ^[[:space:]]*-[[:space:]]url:[[:space:]](.*) ]]; then
                          current_url="${BASH_REMATCH[1]}"
                          echo "  - url: $current_url" >> "$tmp_file"
                          file_count=$((file_count+1))
                        elif [[ $line =~ ^[[:space:]]*sha512:[[:space:]].* && -n $current_url ]]; then
                          file_path="$dir/$current_url"
                          if [ -f "$file_path" ]; then
                            hash=$(sha512sum "$file_path" | awk '{print $1}')
                            b64=$(echo "$hash" | xxd -r -p | base64 | tr -d '\n')
                            echo "    sha512: $b64" >> "$tmp_file"
                            if [[ -z "$first_file_sha512" ]]; then
                              first_file_sha512="$b64"
                              first_file_path="$current_url"
                            fi
                            updated_count=$((updated_count+1))
                          else
                            echo "    sha512: " >> "$tmp_file"
                            missing_count=$((missing_count+1))
                          fi
                          current_url=""
                        elif [[ $line =~ ^[[:space:]]*size:[[:space:]].* ]]; then
                          trimmed="${line#"${line%%[![:space:]]*}"}"
                          echo "    $trimmed" >> "$tmp_file"
                        elif [[ $line =~ ^[[:space:]]*path:[[:space:]].* || $line =~ ^[[:space:]]*sha512:[[:space:]].* || $line =~ ^[[:space:]]*releaseDate:[[:space:]].* ]]; then
                          in_files_section=0
                          echo "$line" >> "$tmp_file"
                        else
                          echo "$line" >> "$tmp_file"
                        fi
                      else
                        if [[ $line =~ ^path:[[:space:]] ]]; then
                          if [[ -n "$first_file_path" ]]; then
                            echo "path: $first_file_path" >> "$tmp_file"
                          else
                            echo "$line" >> "$tmp_file"
                          fi
                        elif [[ $line =~ ^sha512:[[:space:]] ]]; then
                          if [[ -n "$first_file_sha512" ]]; then
                            echo "sha512: $first_file_sha512" >> "$tmp_file"
                          else
                            echo "$line" >> "$tmp_file"
                          fi
                        else
                          echo "$line" >> "$tmp_file"
                        fi
                      fi
                    done < "$yml"
                    echo "[DEBUG] Summary for $yml: $file_count files, $updated_count updated, $missing_count missing"
                    mv "$tmp_file" "$yml"
                    echo "Updated $yml"
                  done

            - name: "Configure stable updater rollout"
              shell: "bash"
              run: |
                  set -euo pipefail
                  find release-dist -type f -name 'latest*.yml' -print0 |
                    while IFS= read -r -d '' metadata; do
                      if grep -q '^stagingPercentage:' "$metadata"; then
                        sed -i 's/^stagingPercentage:.*/stagingPercentage: 100/' "$metadata"
                      else
                        sed -i '/^version:/a stagingPercentage: 100' "$metadata"
                      fi
                      grep -q '^stagingPercentage: 100$' "$metadata"
                    done

            - name: "Print artifact hash (debug, Windows)"
              id: "print_artifact_hash_debug_windows"
              if: "runner.os == 'Windows'"
              shell: "pwsh"
              run: |
                  $patterns = @('*.exe','*.nupkg','*.dmg','*.AppImage','*.snap','*.zip','*.yml','*.blockmap','*.msi','*.deb','*.rpm','*.pkg','*.mas','*.apk','*.p5p','*.pacman','*.freebsd','*.flatpak')
                  $files = @()
                  foreach ($pattern in $patterns) {
                    $files += Get-ChildItem -Path artifacts -Recurse -Include $pattern -ErrorAction SilentlyContinue
                  }
                  foreach ($file in $files | Sort-Object FullName -Unique) {
                    $hash = Get-FileHash $file.FullName -Algorithm SHA512
                    $bytes = for ($i = 0; $i -lt $hash.Hash.Length; $i += 2) { [Convert]::ToByte($hash.Hash.Substring($i, 2), 16) }
                    $b64 = [Convert]::ToBase64String($bytes)
                    Write-Host "$($file.FullName): $b64"
                  }
            - name: "Print artifact hash (debug, Linux)"
              id: "print_artifact_hash_debug_linux"
              if: "runner.os == 'Linux'"
              shell: "bash"
              run: |
                  find artifacts -type f \( -name '*.exe' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.snap' -o -name '*.zip' -o -name '*.yml' -o -name '*.blockmap' -o -name '*.msi' -o -name '*.deb' -o -name '*.rpm' -o -name '*.pkg' -o -name '*.mas' -o -name '*.apk' -o -name '*.p5p' -o -name '*.pacman' -o -name '*.freebsd' -o -name '*.flatpak' \) | sort | while read -r file; do
                    hash=$(sha512sum "$file" | awk '{print $1}')
                    b64=$(echo "$hash" | xxd -r -p | base64)
                    echo "$file: $b64"
                  done
            - name: "Print artifact hash (debug, macOS)"
              id: "print_artifact_hash_debug_macos"
              if: "runner.os == 'macOS'"
              shell: "bash"
              run: |
                  find artifacts -type f \( -name '*.exe' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.snap' -o -name '*.zip' -o -name '*.yml' -o -name '*.blockmap' -o -name '*.msi' -o -name '*.deb' -o -name '*.rpm' -o -name '*.pkg' -o -name '*.mas' -o -name '*.apk' -o -name '*.p5p' -o -name '*.pacman' -o -name '*.freebsd' -o -name '*.flatpak' \) | sort | while read -r file; do
                    hash=$(shasum -a 512 "$file" | awk '{print $1}')
                    b64=$(echo "$hash" | xxd -r -p | base64)
                    echo "$file: $b64"
                  done
            - name: "Rename Squirrel win32 nupkg and RELEASES for release"
              shell: "bash"
              run: |
                  set -euo pipefail

                  ia32_dir="./release-dist/windows-latest-ia32/squirrel-windows-ia32"
                  if [ ! -d "$ia32_dir" ]; then
                    echo "No ia32 Squirrel directory found ($ia32_dir); skipping rename."
                    exit 0
                  fi

                  echo "Normalizing ia32 Squirrel artifacts to avoid basename collisions"

                  # Rename RELEASES -> RELEASES-win32 (to avoid colliding with x64 RELEASES)
                  releases_file=""
                  if [ -f "$ia32_dir/RELEASES" ]; then
                    mv "$ia32_dir/RELEASES" "$ia32_dir/RELEASES-win32"
                    echo "Renamed $ia32_dir/RELEASES -> $ia32_dir/RELEASES-win32"
                    releases_file="$ia32_dir/RELEASES-win32"
                  elif [ -f "$ia32_dir/RELEASES-win32" ]; then
                    releases_file="$ia32_dir/RELEASES-win32"
                  fi

                  # Rename any '*-full.nupkg' (case-insensitive) to include '-win32'
                  # NOTE: electron-builder may output 'uptime-watcher-*-full.nupkg' (lowercase).
                  shopt -s nullglob
                  renamed_pairs=()
                  for file in "$ia32_dir"/*-full.nupkg "$ia32_dir"/*-FULL.nupkg; do
                    if [ ! -f "$file" ]; then
                      continue
                    fi

                    base=$(basename "$file")
                    # Insert '-win32' before '-full.nupkg' (preserve existing casing)
                    new_base=${base/-full.nupkg/-win32-full.nupkg}
                    new_base=${new_base/-FULL.nupkg/-WIN32-FULL.nupkg}
                    new_path="$ia32_dir/$new_base"

                    if [ "$base" = "$new_base" ]; then
                      continue
                    fi

                    mv "$file" "$new_path"
                    echo "Renamed $base -> $new_base"
                    renamed_pairs+=("$base:$new_base")
                  done
                  shopt -u nullglob

                  # If we renamed nupkg files, update RELEASES-win32 to match.
                  if [ -n "$releases_file" ] && [ "${#renamed_pairs[@]}" -gt 0 ]; then
                    for pair in "${renamed_pairs[@]}"; do
                      old_name=${pair%%:*}
                      new_name=${pair##*:}
                      echo "Updating $releases_file: $old_name -> $new_name"
                      perl -pi -e "s/\Q$old_name\E/$new_name/g" "$releases_file"
                    done
                  fi

            - name: "Check duplicate release asset names (debug)"
              id: "check_release_asset_name_duplicates"
              shell: "bash"
              run: |
                  set -euo pipefail

                  echo "Listing all files in release-dist (paths):"
                  find release-dist -type f | sort

                  echo
                  echo "Detecting duplicate asset names (by basename)"
                  # GitHub release assets are keyed by NAME (basename), not by path.
                  duplicates=$(find release-dist -type f -printf '%f\n' | sort | uniq -d || true)

                  if [ -z "$duplicates" ]; then
                    echo "No duplicate basenames detected."
                    exit 0
                  fi

                  echo "ERROR: Duplicate basenames detected (these will collide as GitHub release asset names):"
                  echo "$duplicates"
                  echo

                  while read -r name; do
                    if [ -z "$name" ]; then
                      continue
                    fi
                    echo "Paths for duplicate name: $name"
                    find release-dist -type f -name "$name" -print | sort
                    echo
                  done <<< "$duplicates"

                  exit 1

            - name: "Create and push annotated release tag"
              id: "tag_version"
              shell: "bash"
              run: |
                  set -euo pipefail

                  tag_name="v${{ needs.bump-version.outputs.new_version }}"
                  release_sha="${{ needs.bump-version.outputs.bump_sha }}"

                  git fetch --tags --force
                  if git rev-parse --verify --quiet "refs/tags/${tag_name}" >/dev/null; then
                    echo "::error::Tag ${tag_name} was created while release artifacts were building. Refusing to overwrite it."
                    exit 1
                  fi

                  git -c user.name="github-actions[bot]" \
                    -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
                    tag -a "$tag_name" -m "Release ${tag_name}" "$release_sha"
                  git push origin "refs/tags/${tag_name}:refs/tags/${tag_name}"

            - name: "Create or update release with distributable builds"
              id: "release"
              uses: "softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda" # v3.0.0
              with:
                  tag_name: "v${{ needs.bump-version.outputs.new_version }}"
                  name: "Uptime-Watcher v${{ needs.bump-version.outputs.new_version }}"
                  body: |
                      ## 🚀 Release Notes
                      ${{ steps.release_notes_full.outputs.notes }}

                      **[📄 View Full Changelog](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)**

                      ---

                      <details>
                        <summary><strong>🔍 Merge Commit Details</strong></summary>

                      **Message:**
                      ```
                      ${{ steps.release_notes_full.outputs.notes }}
                      ```

                      **Commit SHA:** `${{ github.sha }}`
                      </details>

                      ---

                      ### 📦 Download Uptime-Watcher

                      <sub> - Most Windows users should download the "Installer EXE", "MSI" or "Portable" versions  </sub>

                      | Windows  | Builds       | Format           | Download Link |
                      |----------|--------------|------------------|---------------|
                      | Windows  | x64          | Installer EXE    | [Uptime-Watcher-nsis-x64-${{ needs.bump-version.outputs.new_version }}.exe](https://github.com/${{ github.repository }}/releases/download/v${{ needs.bump-version.outputs.new_version }}/Uptime-Watcher-nsis-x64-${{ needs.bump-version.outputs.new_version }}.exe) |
                      | Windows  | x64          | Installer Web    | [Uptime-Watcher-nsis-web-x64-${{ needs.bump-version.outputs.new_version }}.exe](https://github.com/${{ github.repository }}/releases/download/v${{ needs.bump-version.outputs.new_version }}/Uptime-Watcher-nsis-web-x64-${{ needs.bump-version.outputs.new_version }}.exe) |
                      | Windows  | x64          | MSI              | [Uptime-Watcher-msi-x64-${{ needs.bump-version.outputs.new_version }}.msi](https://github.com/${{ github.repository }}/releases/download/v${{ needs.bump-version.outputs.new_version }}/Uptime-Watcher-msi-x64-${{ needs.bump-version.outputs.new_version }}.msi) |
                      | Windows  | x64          | Portable         | [Uptime-Watcher-portable-x64-${{ needs.bump-version.outputs.new_version }}.exe](https://github.com/${{ github.repository }}/releases/download/v${{ needs.bump-version.outputs.new_version }}/Uptime-Watcher-portable-x64-${{ needs.bump-version.outputs.new_version }}.exe) |
                      | Windows  | ia32 / win32 | Installer EXE    | [Uptime-Watcher-nsis-ia32-${{ needs.bump-version.outputs.new_version }}.exe](https://github.com/${{ github.repository }}/releases/download/v${{ needs.bump-version.outputs.new_version }}/Uptime-Watcher-nsis-ia32-${{ needs.bump-version.outputs.new_version }}.exe) |
                      | Windows  | ia32 / win32 | Installer Web    | [Uptime-Watcher-nsis-web-ia32-${{ needs.bump-version.outputs.new_version }}.exe](https://github.com/${{ github.repository }}/releases/download/v${{ needs.bump-version.outputs.new_version }}/Uptime-Watcher-nsis-web-ia32-${{ needs.bump-version.outputs.new_version }}.exe) |
                      | Windows  | ia32 / win32 | MSI              | [Uptime-Watcher-msi-ia32-${{ needs.bump-version.outputs.new_version }}.msi](https://github.com/${{ github.repository }}/releases/download/v${{ needs.bump-version.outputs.new_version }}/Uptime-Watcher-msi-ia32-${{ needs.bump-version.outputs.new_version }}.msi) |
                      | Windows  | ia32 / win32 | Portable         | [Uptime-Watcher-portable-ia32-${{ needs.bump-version.outputs.new_version }}.exe](https://github.com/${{ github.repository }}/releases/download/v${{ needs.bump-version.outputs.new_version }}/Uptime-Watcher-portable-ia32-${{ needs.bump-version.outputs.new_version }}.exe) |

                      | Mac      | Builds       | Format           | Download Link |
                      |----------|--------------|------------------|---------------|
                      | macOS    | universal    | DMG              | [Uptime-Watcher-dmg-universal-${{ needs.bump-version.outputs.new_version }}.dmg](https://github.com/${{ github.repository }}/releases/download/v${{ needs.bump-version.outputs.new_version }}/Uptime-Watcher-dmg-universal-${{ needs.bump-version.outputs.new_version }}.dmg) |
                      | macOS    | universal    | PKG              | [Uptime-Watcher-pkg-universal-${{ needs.bump-version.outputs.new_version }}.pkg](https://github.com/${{ github.repository }}/releases/download/v${{ needs.bump-version.outputs.new_version }}/Uptime-Watcher-pkg-universal-${{ needs.bump-version.outputs.new_version }}.pkg) |
