# This workflow scans distributable files in release-dist/ with VirusTotal after every push to main or manual dispatch.
# It uses the crazy-max/ghaction-virustotal action and your provided API key (should be stored as a secret in production).

# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
name: "Virus Total Scan"
run-name: "Virus Total Scan"

on:
    workflow_dispatch:
    workflow_run:
        workflows: ["Build and Release Electron App"]
        branches: ["main"]
        types:
            - "completed"
    schedule:
        - cron: "33 3 1 * *" # Every month at 3:33 AM UTC

permissions:
    contents: "read"

concurrency:
    group: "virustotal-${{ github.ref }}"
    cancel-in-progress: "${{ false }}"

defaults:
    run:
        shell: "bash"

jobs:
    virustotal:
        name: "Scan release assets with VirusTotal"
        if: "github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'"
        runs-on: "ubuntu-latest"
        timeout-minutes: 30
        steps:
            - name: "Harden the runner (Audit all outbound calls)"
              uses: "step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411" # v2.19.4
              with:
                  egress-policy: "audit"

            - name: "Checkout released revision"
              uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10" # v6.0.3
              with:
                  ref: "${{ github.event.workflow_run.head_sha || github.sha }}"

            - name: "Download target release assets"
              env:
                  GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
              run: |
                  set -euo pipefail
                  release_tag="v$(node -p "require('./package.json').version")"
                  mkdir -p release-dist
                  gh release download "$release_tag" --dir release-dist

            - name: "Select assets requiring VirusTotal analysis"
              env:
                  VT_API_KEY: "${{ secrets.VT_API_KEY }}"
              run: |
                  set -euo pipefail
                  mkdir -p virustotal-upload

                  while IFS= read -r -d '' file; do
                    digest=$(sha256sum "$file" | awk '{print $1}')
                    status=""

                    for attempt in 1 2 3 4; do
                      if ! status=$(curl \
                          --silent \
                          --show-error \
                          --output /dev/null \
                          --write-out '%{http_code}' \
                          --header "x-apikey: ${VT_API_KEY}" \
                          "https://www.virustotal.com/api/v3/files/${digest}"); then
                        status="000"
                      fi

                      if [ "$status" != "000" ] && [ "$status" != "429" ] && [[ "$status" != 5* ]]; then
                        break
                      fi

                      if [ "$attempt" -eq 4 ]; then
                        break
                      fi

                      echo "VirusTotal lookup returned HTTP $status; retrying attempt $attempt/4"
                      sleep 15
                    done

                    case "$status" in
                      200)
                        echo "Already analyzed: $(basename "$file")"
                        ;;
                      404)
                        ln "$file" "virustotal-upload/$(basename "$file")"
                        echo "Queued for analysis: $(basename "$file")"
                        ;;
                      *)
                        echo "::error::VirusTotal lookup failed for $(basename "$file") with HTTP $status"
                        exit 1
                        ;;
                    esac
                  done < <(find release-dist -maxdepth 1 -type f -print0 | sort -z)

            - name: "VirusTotal Scan"
              uses: "crazy-max/ghaction-virustotal@936d8c5c00afe97d3d9a1af26d017cfdf26800a2" # v5.0.0
              with:
                  vt_api_key: "${{ secrets.VT_API_KEY }}"
                  request_rate: 4
                  files: "virustotal-upload/*"
