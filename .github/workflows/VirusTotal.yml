# This workflow scans distributable files in release-dist/ with VirusTotal after every push to main or manual dispatch.
# It uses the crazy-max/ghaction-virustotal action and your provided API key (should be stored as a secret in production).

# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
name: Virus Total Scan
run-name: Virus Total Scan

on:
    workflow_dispatch:
    workflow_run:
        workflows: ["Build and Release Electron App"]
        branches: ["main"]
        types:
            - completed
    schedule:
        - cron: "33 3 1 * *" # Every month at 3:33 AM UTC

permissions:
    contents: read

concurrency:
    group: virustotal-${{ github.ref }}
    cancel-in-progress: ${{ false }}

defaults:
    run:
        shell: bash

jobs:
    virustotal:
        name: Scan release assets with VirusTotal
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Download latest release assets
              uses: robinraju/release-downloader@28fc21f50d76778e7023361aa1f863e717d3d56f # v1.13
              with:
                  latest: true
                  fileName: "*"
                  out-file-path: release-dist
                  token: ${{ secrets.GITHUB_TOKEN }}
            - name: VirusTotal Scan
              uses: crazy-max/ghaction-virustotal@936d8c5c00afe97d3d9a1af26d017cfdf26800a2 # v5.0.0
              with:
                  vt_api_key: ${{ secrets.VT_API_KEY }}
                  files: |
                      release-dist/*
                      release-dist/**/*
              continue-on-error: true
