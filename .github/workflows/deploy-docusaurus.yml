# Deploy Docusaurus site to GitHub Pages
# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
name: "Deploy Docusaurus to GitHub Pages"
run-name: "Deploy Docusaurus To GitHub Pages"

on:
    # Runs on pushes targeting the default branch
    push:
        branches: ["main"]
        paths:
            - ".github/workflows/backup-docusaurus.yml"
            - ".github/workflows/deploy-docusaurus.yml"
            - "docs/docusaurus/**"
            - "docs/docusaurus/docusaurus.config.ts"
            - "electron/**"
            - "shared/**"
            - "src/**"

    # Allows you to run this workflow manually from the Actions tab
    workflow_dispatch:

        # Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
        # However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
    group: "pages"
    cancel-in-progress: "${{ false }}"

defaults:
    run:
        shell: "bash"

jobs:
    # Build job
    build:
        name: "Build Docusaurus"
        runs-on: "ubuntu-latest"
        timeout-minutes: 60
        permissions:
            contents: "read"
        steps:
            - name: "Harden the runner (Audit all outbound calls)"
              uses: "step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411" # v2.19.4
              with:
                  egress-policy: "audit"

            - name: "Checkout"
              uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10" # v6.0.3
              with:
                  fetch-depth: 0 # Need full history for proper git info

            - name: "Setup Node.js"
              uses: "actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e" # v6.4.0
              with:
                  node-version-file: ".node-version"
                  cache: "npm"
                  cache-dependency-path: "package-lock.json"

            - name: "Cache dependencies and build artifacts"
              uses: "actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae" # v5.0.5
              with:
                  path: |
                      node_modules
                      ~/.npm
                      docs/docusaurus/node_modules
                      docs/docusaurus/.cache
                      .cache
                      node_modules/.cache
                      docs/docusaurus/node_modules/.cache
                      docs/docusaurus/build/.cache
                      **/.rspack-cache
                      **/.webpack-cache
                  key: "${{ runner.os }}-build-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('docs/docusaurus/package-lock.json') }}"
                  restore-keys: |
                      ${{ runner.os }}-build-${{ hashFiles('**/package-lock.json') }}-
                      ${{ runner.os }}-build-

            - name: "Install dependencies - Main App"
              run: "npm install --force"

            - name: "Install dependencies - Docusaurus"
              run: "cd docs/docusaurus && npm install --force"

            - name: "Build before TypeDoc"
              run: |
                  # Build files
                  npm run build:electron-vite

            - name: "Generate unified TypeDoc documentation"
              run: |
                  # Generate unified TypeDoc documentation for all source code (Frontend, Backend, Shared)
                  npm run docs:typedoc
              continue-on-error: true

            - name: "List TypeDoc output directories"
              run: |
                  echo "TypeDoc output directories:"
                  if [ -d "docs/docusaurus/docs" ]; then
                      ls -l docs/docusaurus/docs
                  else
                      echo "TypeDoc docs directory was not generated."
                  fi

                  ls -l docs || true

            - name: "Build Docusaurus website"
              run: "npm run docusaurus:build"
              continue-on-error: true

            - name: "Setup Pages"
              uses: "actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d" # v6.0.0

            - name: "Upload build artifact"
              uses: "actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9" # v5.0.0
              with:
                  path: "docs/docusaurus/build"

    # Deployment job
    deploy:
        name: "Deploy to GitHub Pages"
        environment:
            name: "github-pages"
            url: "${{ steps.deployment.outputs.page_url }}"
        runs-on: "ubuntu-latest"
        needs: "build"
        timeout-minutes: 30
        permissions:
            pages: "write"
            id-token: "write"
        steps:
            - name: "Harden the runner (Audit all outbound calls)"
              uses: "step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411" # v2.19.4
              with:
                  egress-policy: "audit"

            - name: "Deploy to GitHub Pages"
              id: "deployment"
              uses: "actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128" # v5.0.0
