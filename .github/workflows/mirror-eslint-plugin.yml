# Mirror the internal uptime-watcher ESLint plugin folder to a separate GitHub repo
# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
name: "Mirror ESLint Plugin Repo"
run-name: "Mirror ESLint Plugin Repo"

on:
    push:
        branches: ["main"]
        paths:
            - "config/linting/plugins/uptime-watcher/**"
            - "config/linting/plugins/uptime-watcher.mjs"
            - ".github/workflows/mirror-eslint-plugin.yml"

    workflow_dispatch:

permissions:
    contents: "read"

concurrency:
    group: "eslint-plugin-mirror"
    cancel-in-progress: true

jobs:
    mirror:
        name: "Mirror plugin folder"
        runs-on: "ubuntu-latest"
        if: "github.repository == 'Nick2bad4u/Uptime-Watcher'"
        timeout-minutes: 20
        env:
            SOURCE_DIR: "config/linting/plugins/uptime-watcher"
        steps:
            - name: "Harden the runner (Audit all outbound calls)"
              uses: "step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411" # v2.19.4
              with:
                  egress-policy: "audit"

            - name: "Checkout"
              uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10" # v6.0.3
              with:
                  fetch-depth: 1

            - name: "Resolve target repository"
              id: "target"
              shell: "bash"
              run: |
                  set -euo pipefail

                  TARGET_REPO="${{ vars['ESLINT_PLUGIN_MIRROR_REPO'] }}"

                  if [[ -z "${TARGET_REPO}" ]]; then
                      echo "Missing target repository. Define the repo variable 'ESLINT_PLUGIN_MIRROR_REPO'." >&2
                      exit 1
                  fi

                  echo "repo=${TARGET_REPO}" >> "${GITHUB_OUTPUT}"

            - name: "Validate required deploy key"
              shell: "bash"
              env:
                  MIRROR_SSH_KEY: "${{ secrets['ESLINT_PLUGIN_MIRROR_SSH_KEY'] }}"
              run: |
                  set -euo pipefail

                  if [[ -z "${MIRROR_SSH_KEY}" ]]; then
                      echo "Missing secret ESLINT_PLUGIN_MIRROR_SSH_KEY." >&2
                      echo "Create a write-enabled deploy key on the target repo and store its private key in this secret." >&2
                      exit 1
                  fi

            - name: "Configure mirror deploy key"
              shell: "bash"
              env:
                  MIRROR_SSH_KEY: "${{ secrets['ESLINT_PLUGIN_MIRROR_SSH_KEY'] }}"
              run: |
                  set -euo pipefail

                  mkdir -p "${HOME}/.ssh"
                  printf '%s\n' "${MIRROR_SSH_KEY}" > "${HOME}/.ssh/eslint_plugin_mirror"
                  chmod 600 "${HOME}/.ssh/eslint_plugin_mirror"
                  ssh-keyscan github.com >> "${HOME}/.ssh/known_hosts"
                  chmod 600 "${HOME}/.ssh/known_hosts"
                  {
                      echo "Host github.com"
                      echo "    HostName github.com"
                      echo "    User git"
                      echo "    IdentityFile ${HOME}/.ssh/eslint_plugin_mirror"
                      echo "    IdentitiesOnly yes"
                  } >> "${HOME}/.ssh/config"
                  chmod 600 "${HOME}/.ssh/config"

            - name: "Prepare mirror working directory"
              shell: "bash"
              run: |
                  set -euo pipefail

                  rm -rf ./temp/eslint-plugin-mirror
                  mkdir -p ./temp/eslint-plugin-mirror

            - name: "Push to target repository"
              shell: "bash"
              working-directory: "./temp/eslint-plugin-mirror"
              env:
                  SOURCE_DIR: "${{ env.SOURCE_DIR }}"
                  TARGET_REPO: "${{ steps.target.outputs.repo }}"
                  TARGET_BRANCH: "main"
              run: |
                  set -euo pipefail

                  TARGET_BRANCH="${TARGET_BRANCH:-main}"

                  git init -b "${TARGET_BRANCH}"
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

                  git remote add origin "git@github.com:${TARGET_REPO}.git"

                  # If the branch exists, fetch it so we can append a commit normally.
                  if git ls-remote --exit-code --heads origin "${TARGET_BRANCH}" >/dev/null 2>&1; then
                      git fetch origin "${TARGET_BRANCH}" --depth=1
                      git checkout -B "${TARGET_BRANCH}" "origin/${TARGET_BRANCH}"
                  else
                      git checkout -B "${TARGET_BRANCH}"
                  fi

                  # Synchronize implementation-owned paths while preserving the
                  # standalone repository's package/config/lock files. Those files
                  # deliberately differ from the monorepo workspace package.
                  for directory in _internal docs rules test; do
                      mkdir -p "${directory}"
                      rsync -a --delete \
                          "${GITHUB_WORKSPACE}/${SOURCE_DIR}/${directory}/" \
                          "./${directory}/"
                  done

                  for file in README.md plugin.cjs plugin.d.cts plugin.d.mts plugin.mjs; do
                      cp -a "${GITHUB_WORKSPACE}/${SOURCE_DIR}/${file}" "./${file}"
                  done

                  # Include the stable wrapper used by external consumers.
                  cp -a "${GITHUB_WORKSPACE}/config/linting/plugins/uptime-watcher.mjs" ./uptime-watcher.mjs

                  git add -A

                  if git diff --cached --quiet; then
                      echo "No changes to mirror."
                      exit 0
                  fi

                  git commit -m "Mirror from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"

                  # IMPORTANT: normal push only (no force). This will NOT rewrite the
                  # target repo history; it only appends commits. If the target branch
                  # diverges due to manual edits, the push will fail instead of
                  # overwriting history.
                  git push origin "HEAD:${TARGET_BRANCH}"
