# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
name: Upload Windows Distributables to Archive Org
run-name: Upload Windows Distributables To Archive Org

on:
    workflow_dispatch:
    workflow_run:
        workflows: ["Build and Release Electron App"]
        branches: ["main"]
        types:
            - completed
    schedule:
        - cron: "33 3 1 * *" # Every month at 3:33 AM UTC

concurrency:
    group: IAWINDOWS-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

defaults:
    run:
        shell: bash

jobs:
    upload-windows:
        name: Upload Windows distributables to archive.org
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Download Windows release assets (msi-)
              id: download_msi
              uses: robinraju/release-downloader@28fc21f50d76778e7023361aa1f863e717d3d56f # v1.13
              with:
                  latest: true
                  fileName: "Uptime-Watcher-msi-*"
                  out-file-path: release-dist
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Download Windows release assets (nsis-)
              id: download_nsis
              uses: robinraju/release-downloader@28fc21f50d76778e7023361aa1f863e717d3d56f # v1.13
              with:
                  latest: true
                  fileName: "Uptime-Watcher-nsis-*"
                  out-file-path: release-dist
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Download Windows release assets (portable-)
              id: download_portable
              uses: robinraju/release-downloader@28fc21f50d76778e7023361aa1f863e717d3d56f # v1.13
              with:
                  latest: true
                  fileName: "Uptime-Watcher-portable-*"
                  out-file-path: release-dist
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Download Windows release assets (latest.yml)
              id: download_latest
              uses: robinraju/release-downloader@28fc21f50d76778e7023361aa1f863e717d3d56f # v1.13
              with:
                  latest: true
                  fileName: "latest.yml"
                  out-file-path: release-dist
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload Windows distributables to archive.org
              uses: Nick2bad4u/internet-archive-upload@369aaddeede5cca7f0be4cb39dcc89e35afbdf48 # v2.0.0
              with:
                  access-key: ${{ secrets.IA_ACCESS_KEY }}
                  secret-key: ${{ secrets.IA_SECRET_KEY }}
                  identifier: Uptime-Watcher-windows-${{ steps.download_msi.outputs.tag_name }}
                  files: release-dist/
              continue-on-error: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
