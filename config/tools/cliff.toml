# git-cliff configuration for user-facing release history.
# https://git-cliff.org/docs/configuration
# yaml-language-server: $schema=https://www.schemastore.org/git-cliff.json

"$schema" = "https://www.schemastore.org/git-cliff.json"

[changelog]
header = """
<!-- markdownlint-disable -->
# Changelog

Notable user-facing changes are documented here. Internal maintenance is
available in the repository's Git history.

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}
{% if previous and previous.version and version %}
[Full comparison](https://github.com/Nick2bad4u/Uptime-Watcher/compare/{{ previous.version }}...{{ version }})
{% elif commit_range and commit_range.from and commit_range.to %}
[Full comparison](https://github.com/Nick2bad4u/Uptime-Watcher/compare/{{ commit_range.from }}...{{ commit_range.to }})
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first | trim | upper_first }} \
  [`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/Nick2bad4u/Uptime-Watcher/commit/{{ commit.id }})
{% endfor %}
{% endfor %}
"""
footer = """
<!-- generated by git-cliff -->
"""
trim = true
render_always = false

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
protect_breaking_commits = true
filter_commits = true
fail_on_unmatched_commit = false
tag_pattern = "^v[0-9]+\\.[0-9]+\\.[0-9]+$"
topo_order = false
sort_commits = "newest"
recurse_submodules = false

commit_parsers = [
    # Never publish repository-maintenance bookkeeping as release notes.
    { message = "^Merge (branch|pull request)", skip = true },
    { message = "^merge branch", skip = true },
    { message = "^.*\\[(test|style|chore|ci|build|docs|refactor)\\]", skip = true },
    { message = "^(test|style|chore|ci|build|docs|refactor)(\\(.+\\))?[!:]", skip = true },
    { message = "^.*(dependabot|npm-all)", skip = true },
    { message = "^(Bump|Bumps) ", skip = true },
    { message = "^.*prepare (Uptime Watcher |for )?v?[0-9]+\\.[0-9]+\\.[0-9]+", skip = true },
    { message = "^.*update changelogs? for v?[0-9]+\\.[0-9]+\\.[0-9]+", skip = true },

    # Security is evaluated before fixes because security fixes often carry
    # the repository's generic [fix] marker as well.
    { message = "^.*\\[security\\]", group = "<!-- 0 -->Security" },
    { message = "^(🔒️|🔒|🔐|🛂|:lock:|:closed_lock_with_key:|:passport_control:)", group = "<!-- 0 -->Security" },
    { message = "^security(\\(.+\\))?[!:]", group = "<!-- 0 -->Security" },

    { message = "^.*\\[feat\\]", group = "<!-- 1 -->Features" },
    { message = "^(✨|:sparkles:)", group = "<!-- 1 -->Features" },
    { message = "^feat(\\(.+\\))?[!:]", group = "<!-- 1 -->Features" },

    { message = "^.*\\[fix\\]", group = "<!-- 2 -->Fixes" },
    { message = "^(🐛|🚑️|🚑|🥅|🩹|:bug:|:ambulance:|:goal_net:|:adhesive_bandage:)", group = "<!-- 2 -->Fixes" },
    { message = "^fix(\\(.+\\))?[!:]", group = "<!-- 2 -->Fixes" },

    { message = "^.*\\[perf\\]", group = "<!-- 3 -->Performance" },
    { message = "^(⚡️|⚡|🧵|:zap:|:thread:)", group = "<!-- 3 -->Performance" },
    { message = "^perf(\\(.+\\))?[!:]", group = "<!-- 3 -->Performance" },

    { message = "^.*\\[revert\\]", group = "<!-- 4 -->Reverts" },
    { message = "^(⏪️|⏪|:rewind:|revert)", group = "<!-- 4 -->Reverts" },

    # Unknown commit styles are intentionally omitted from public notes.
    { message = ".*", skip = true },
]

[remote]
offline = true

[remote.github]
owner = "Nick2bad4u"
repo = "Uptime-Watcher"
