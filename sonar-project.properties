sonar.cpd.ts.minimumTokens=100

# ===============================================================================
# SECURITY CONFIGURATION
# ===============================================================================

sonar.issues.defaultAssigneeLogin=Nick2bad4u@github

sonar.security.exclusions=\
assets/**,**/assets/**,\
benchmarks/**,**/benchmarks/**,\
config/**,**/config/**,\
coverage/**,**/coverage/**,\
dist/**,**/dist/**,\
docs/**,**/docs/**,\
e2e/**,**/e2e/**,\
