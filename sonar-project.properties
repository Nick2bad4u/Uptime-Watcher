*.d.ts,\
*.log,\
*.node,\
*.spec.ts,\
*.spec.tsx,\
*.test.ts,\
*.test.tsx,\
*.wasm

# ===============================================================================
# LANGUAGE AND FILE TYPE CONFIGURATION
# ===============================================================================

sonar.typescript.file.suffixes=.ts,.tsx,.mts,.cts
sonar.typescript.tsconfigPaths=tsconfig.json,tsconfig.electron.json,tsconfig.shared.json

sonar.javascript.file.suffixes=.js,.jsx,.mjs,.cjs

# Root-safe inclusions
sonar.inclusions=\
electron/**/*.cjs,electron/**/*.cts,electron/**/*.js,electron/**/*.jsx,electron/**/*.mjs,electron/**/*.mts,electron/**/*.ts,electron/**/*.tsx,\
shared/**/*.cjs,shared/**/*.cts,shared/**/*.js,shared/**/*.jsx,shared/**/*.mjs,shared/**/*.mts,shared/**/*.ts,shared/**/*.tsx,\
src/**/*.cjs,src/**/*.cts,src/**/*.js,src/**/*.jsx,src/**/*.mjs,src/**/*.mts,src/**/*.ts,src/**/*.tsx

# ===============================================================================
# TEST CONFIGURATION
# ===============================================================================

sonar.tests=src/test,electron/test,shared/test,tests/

sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

sonar.test.exclusions=\
build/**,**/build/**,\
coverage/**,**/coverage/**,\
dist/**,**/dist/**,\
node_modules/**,**/node_modules/**

# ===============================================================================
# CODE COVERAGE CONFIGURATION
# ===============================================================================

sonar.javascript.lcov.reportPaths=\
coverage/lcov.info,\
coverage/electron/lcov.info,\
coverage/shared/lcov.info,\
coverage/storybook/lcov.info

sonar.coverage.exclusions=\
assets/**,**/assets/**,\
benchmarks/**,**/benchmarks/**,\
config/**,**/config/**,\
coverage/**,**/coverage/**,\
